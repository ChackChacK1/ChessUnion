# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name chess-union.ru www.chess-union.ru;
    return 301 https://chess-union.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name chess-union.ru www.chess-union.ru;

    client_max_body_size 100M;

    ssl_certificate /etc/ssl/nginx/chess-union.ru.chained.crt;
    ssl_certificate_key /etc/ssl/nginx/certificate.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== API -> backend service in docker network =====
    location ^~ /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Images -> backend =====
    location ^~ /profile-images/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== Frontend SPA (React Router) =====
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}